<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="32,3 58,17 58,47 32,61 6,47 6,17"
    fill="url(#g2)" stroke="url(#g1)" stroke-width="2" filter="url(#glow)"/>

  <!-- Inner hexagon -->
  <polygon points="32,12 50,22 50,42 32,52 14,42 14,22"
    fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.5"/>

  <!-- Eye outline -->
  <ellipse cx="32" cy="32" rx="12" ry="8"
    fill="none" stroke="url(#g1)" stroke-width="2" filter="url(#glow)"/>

  <!-- Iris -->
  <circle cx="32" cy="32" r="5"
    fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.8"/>

  <!-- Pupil -->
  <circle cx="32" cy="32" r="2.5" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Horizontal scan lines -->
  <line x1="14" y1="32" x2="20" y2="32" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
  <line x1="44" y1="32" x2="50" y2="32" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>

  <!-- Vertical tick marks -->
  <line x1="32" y1="12" x2="32" y2="18" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <line x1="32" y1="46" x2="32" y2="52" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>

  <!-- Corner dots -->
  <circle cx="6"  cy="17" r="1.5" fill="#6366f1" opacity="0.7"/>
  <circle cx="58" cy="17" r="1.5" fill="#06b6d4" opacity="0.7"/>
  <circle cx="6"  cy="47" r="1.5" fill="#06b6d4" opacity="0.7"/>
  <circle cx="58" cy="47" r="1.5" fill="#6366f1" opacity="0.7"/>
</svg>
